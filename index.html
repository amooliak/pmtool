<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>ProjectHub</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"><link rel="stylesheet" href="styles.css"><link rel="stylesheet" href="actions.css"></head>
<body><div class="app">
<aside class="sidebar"><div class="brand"><b>P</b><strong>PM Tool</strong></div><button class="company"><span>MC</span>My Company<i>⌄</i></button><p class="crumb">Home / Portfolio / ProjectHub</p><nav class="side-nav"><button data-view="dashboard">⌂ <span>Dashboard</span></button><button data-view="projects">□ <span>Projects</span></button><button class="active" data-view="portfolio">▥ <span>Portfolio</span></button><button data-view="reports">▤ <span>Reports</span></button></nav><div class="project-list"><label>PROJECTS</label><p>PORTFOLIOS</p><button class="selected"><i class="dot blue"></i>Website Redesign <span>⌄</span></button><button><i class="dot purple"></i>ERP Migration <span>›</span></button></div><div class="profile"><i>AK</i><span><strong>Amoolia K.</strong></span><b>⚙</b></div></aside>
<main><header><div><h1>ProjectHub</h1><p>⌂ Home&nbsp;&nbsp;›&nbsp;&nbsp; Portfolio&nbsp;&nbsp;›&nbsp;&nbsp; ProjectHub</p></div><button class="primary create-trigger">＋ Create Project</button></header><nav class="top-nav"><button data-view="dashboard">⌂<span>Dashboard</span></button><button data-view="projects">□<span>Projects</span></button><button class="active" data-view="portfolio">▥<span>Portfolio</span></button><button data-view="reports">▤<span>Reports</span></button></nav><section id="content"></section></main>
<button class="fab" id="fab" aria-label="Open create menu">＋</button><div class="quick-menu" id="quick-menu"><button class="create-trigger"><b>□</b><span><strong>Create project</strong><small>Start a new project with team and budget setup</small></span></button><button><b>▤</b><span><strong>Add project update</strong><small>Log progress, milestones or status changes</small></span></button><button><b>$</b><span><strong>Add budget update</strong><small>Record expenditures or budget adjustments</small></span></button></div>
<div class="backdrop" id="modal"><section class="modal"><div class="modal-head"><h2>Create a new project</h2><button id="close-modal">⊗</button></div><form id="project-form"><div class="modal-body"><label>Project name <em>*</em><input name="name" required></label><label>Project ID<input name="id" value="PRJ-009"></label><small>Auto-generated. You can edit this.</small><label>Project description<textarea name="description" placeholder="Describe the project objectives, scope, and key deliverables..."></textarea></label><label>Project manager <em>*</em><select name="manager" required><option value="">Search for a team member...</option><option>Sarah Chen</option><option>James Wilson</option><option>Maria Lopez</option></select></label><label>Department<select name="department"><option>Marketing</option><option>IT</option><option>Product</option><option>Analytics</option><option>Compliance</option></select></label><div class="grid"><label>Project status<select name="status"><option>Not Started</option><option>On Track</option><option>At Risk</option></select></label><label>Risk level<select name="risk"><option>Low</option><option>Medium</option><option>High</option></select></label><label>Start date <em>*</em><input name="start" type="date" required></label><label>Target completion date<input name="target" type="date"></label><label>Estimated cost<input name="cost" placeholder="$ 0.00"></label><label>Forecasted savings<input name="savings" placeholder="$ 0.00"></label></div><label>Percentage complete<input name="progress" type="number" value="0" min="0" max="100"></label><label>Risks or blockers <small>(Optional)</small><textarea name="blockers" placeholder="Describe any known risks, dependencies, or blockers..."></textarea></label></div><footer><button type="button" id="cancel-modal">Cancel</button><button class="primary" type="submit">Create project</button></footer></form></section></div>
</div><script src="app.js"></script></body></html>
