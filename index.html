<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="PM Tool project portfolio dashboard" />
    <title>PM Tool</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <a class="skip-link" href="#content">Skip to main content</a>
    <div class="app">
      <aside class="sidebar" aria-label="Workspace navigation">
        <div class="brand">
          <b aria-hidden="true">P</b><strong>PM Tool</strong>
        </div>
        <button class="company" type="button">
          <span>MC</span>My Company<i aria-hidden="true">⌄</i>
        </button>
        <p class="crumb">Home / Portfolio / PM Tool</p>
        <nav class="side-nav" aria-label="Primary navigation">
          <button type="button" data-view="dashboard">
  <i data-lucide="layout-dashboard" aria-hidden="true"></i>
  <span>Dashboard</span>
</button>

<button type="button" data-view="projects">
  <i data-lucide="folder" aria-hidden="true"></i>
  <span>Projects</span>
</button>

<button type="button" class="active" data-view="portfolio">
  <i data-lucide="layers" aria-hidden="true"></i>
  <span>Portfolio</span>
</button>

<button type="button" data-view="reports">
  <i data-lucide="chart-column" aria-hidden="true"></i>
  <span>Reports</span>
</button>
        </nav>
        <div class="project-list" aria-label="Recent projects">
          <p class="section-label">PROJECTS</p>
          <p>PORTFOLIOS</p>
          <button type="button" class="selected">
            <i class="dot blue" aria-hidden="true"></i>Website Redesign
          </button>
          <button type="button">
            <i class="dot purple" aria-hidden="true"></i>ERP Migration
          </button>
        </div>
        <div class="profile">
          <i>AK</i><span><strong>Amoolia K.</strong></span
          ><b aria-hidden="true">⚙</b>
        </div>
      </aside>

      <main>
        <header>
          <div>
            <h1>PM Tool</h1>
            <p>Home &nbsp;›&nbsp; Portfolio &nbsp;›&nbsp; PM Tool</p>
          </div>
          <button class="primary create-trigger" type="button">
            ＋ Create project
          </button>
        </header>
        <nav class="top-nav" aria-label="Application views">
          <button type="button" data-view="dashboard">
  <i data-lucide="layout-dashboard" aria-hidden="true"></i>
  <span>Dashboard</span>
</button>

<button type="button" data-view="projects">
  <i data-lucide="folder" aria-hidden="true"></i>
  <span>Projects</span>
</button>

<button type="button" class="active" data-view="portfolio">
  <i data-lucide="layers" aria-hidden="true"></i>
  <span>Portfolio</span>
</button>

<button type="button" data-view="reports">
  <i data-lucide="chart-column" aria-hidden="true"></i>
  <span>Reports</span>
</button>
        </nav>
        <section id="content" tabindex="-1"></section>
      </main>
    </div>

    <button
      class="fab"
      id="fab"
      type="button"
      aria-label="Open create menu"
      aria-expanded="false"
      aria-controls="quick-menu"
    >
      ＋
    </button>
    <div class="quick-menu" id="quick-menu" aria-label="Quick actions" hidden>
      <button type="button" class="create-trigger">
        <b aria-hidden="true">□</b
        ><span
          ><strong>Create project</strong
          ><small>Start a new project with team and budget setup</small></span
        >
      </button>
      <button type="button" disabled>
        <b aria-hidden="true">▤</b
        ><span
          ><strong>Add project update</strong><small>Coming soon</small></span
        >
      </button>
      <button type="button" disabled>
        <b aria-hidden="true">$</b
        ><span
          ><strong>Add budget update</strong><small>Coming soon</small></span
        >
      </button>
    </div>

    <div class="backdrop" id="modal" hidden>
      <section
        class="modal"
        role="dialog"
        aria-modal="true"
        aria-labelledby="modal-title"
        aria-describedby="form-help"
      >
        <div class="modal-head">
          <h2 id="modal-title">Create a new project</h2>
          <button
            id="close-modal"
            type="button"
            aria-label="Close project form"
          >
            ×
          </button>
        </div>
        <form id="project-form" novalidate>
          <div class="modal-body">
            <p id="form-help">Fields marked with an asterisk are required.</p>
            <div
              id="form-errors"
              class="form-errors"
              role="alert"
              tabindex="-1"
              hidden
            ></div>

            <label for="project-name">Project name <em>*</em></label>
            <input id="project-name" name="name" required maxlength="80" />

            <label for="project-id">Project ID <em>*</em></label>
            <input
              id="project-id"
              name="id"
              required
              pattern="PRJ-[0-9]{3,}"
              aria-describedby="id-help"
            />
            <small id="id-help"
              >Use the format PRJ-009. A number is generated
              automatically.</small
            >

            <label for="description">Project description</label>
            <textarea
              id="description"
              name="description"
              maxlength="500"
              placeholder="Describe the project objectives, scope, and key deliverables..."
            ></textarea>

            <label for="manager">Project manager <em>*</em></label>
            <select id="manager" name="manager" required>
              <option value="">Select a team member...</option>
              <option>Sarah Chen</option>
              <option>James Wilson</option>
              <option>Maria Lopez</option>
            </select>

            <label for="department">Department</label>
            <select id="department" name="department">
              <option>Marketing</option>
              <option>IT</option>
              <option>Product</option>
              <option>Analytics</option>
              <option>Compliance</option>
              <option>Sales</option>
              <option>Operations</option>
            </select>

            <div class="grid">
              <div>
                <label for="status">Project status</label
                ><select id="status" name="status">
                  <option>Not Started</option>
                  <option>On Track</option>
                  <option>At Risk</option>
                  <option>Delayed</option>
                  <option>Completed</option>
                </select>
              </div>
              <div>
                <label for="risk">Risk level</label
                ><select id="risk" name="risk">
                  <option>Low</option>
                  <option>Medium</option>
                  <option>High</option>
                </select>
              </div>
              <div>
                <label for="start">Start date <em>*</em></label
                ><input id="start" name="start" type="date" required />
              </div>
              <div>
                <label for="target">Target completion date <em>*</em></label
                ><input id="target" name="target" type="date" required />
              </div>
              <div>
                <label for="cost">Estimated cost</label
                ><input
                  id="cost"
                  name="cost"
                  type="number"
                  min="0"
                  step="0.01"
                  inputmode="decimal"
                  placeholder="0.00"
                />
              </div>
              <div>
                <label for="savings">Forecasted savings</label
                ><input
                  id="savings"
                  name="savings"
                  type="number"
                  min="0"
                  step="0.01"
                  inputmode="decimal"
                  placeholder="0.00"
                />
              </div>
            </div>

            <label for="progress">Percentage complete</label>
            <input
              id="progress"
              name="progress"
              type="number"
              value="0"
              min="0"
              max="100"
              required
            />

            <label for="blockers"
              >Risks or blockers <small>(optional)</small></label
            >
            <textarea
              id="blockers"
              name="blockers"
              maxlength="500"
              placeholder="Describe any known risks, dependencies, or blockers..."
            ></textarea>
          </div>
          <footer>
            <button type="button" id="cancel-modal">Cancel</button>
            <button class="primary" type="submit">Create project</button>
          </footer>
        </form>
      </section>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite" hidden></div>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="data.js"></script>
    <script src="utils.js"></script>
    <script src="components.js"></script>
    <script src="app.js"></script>
    <script>
  lucide.createIcons();
</script>
  </body>
</html>
